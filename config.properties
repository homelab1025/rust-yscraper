# Configuration for rust-yscraper (INI/properties format)
# URL of the HN item page to scrape (currently unused by the app)
url=https://news.ycombinator.com/item?id=45561428

# HTTP server port (can also be set as server.port)
port=3000

# PostgreSQL database URL (can also be set as db.url)
# Example local default: postgres://postgres:postgres@localhost:5432/yscraper
# You may also set the DATABASE_URL environment variable instead of this file.
db_url=postgres://postgres:postgres@localhost:5432/yscraper