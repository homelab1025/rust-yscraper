name: Yscraper

on:
  push:
    tags: [ '*' ]
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  OPENAPI_SPEC_PATH: "target/release/openapi.yaml"
  CACHED_PATHS: |
    target/release/**

jobs:

  build:
    runs-on: self-hosted
    outputs:
      release_version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Release Version
        id: set_version
        run: |
          # Generate a version string. You can customize this.
          # Examples:
          #  - Short SHA: version=$(git rev-parse --short HEAD)
          #  - Run number and short SHA: version="${{ github.run_number }}-${{ github.sha }}"
          # For a release on each commit, using a timestamp or run number + short SHA is good.
          VERSION=$(date +'%Y%m%d%H%M%S')-${{ github.sha }}
          echo "Generated Release Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash
      - name: Run tests
        run: cargo test
      - name: Build
        run: cargo build --release
      - name: Build API spec
        run: target/release/api_gen ${{env.OPENAPI_SPEC_PATH}}
      - name: Cache target
        uses: actions/cache@v5
        with:
          key: target-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{env.CACHED_PATHS}}

  build-web-server:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache target
        uses: actions/cache@v5
        with:
          key: target-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{env.CACHED_PATHS}}
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for python scraper
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.build.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  build-webapp:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache target
        uses: actions/cache@v5
        with:
          key: target-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{env.CACHED_PATHS}}
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for web app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: webapp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp:v${{ needs.build.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp:latest