apiVersion: batch/v1
kind: Job
metadata:
  name: liquibase
  labels:
    type: pre-deploy
spec:
  template:
    spec:
      containers:
      - name: liquibase
        image: liquibase/liquibase:4.23
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: yscraper-db-password
              key: password
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: yscraper-db-password
              key: username
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: yscraper-db-password
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: yscraper-db-password
              key: port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: yscraper-db-password
              key: dbname
        args:
          - |
            liquibase \
              --defaultsFile=/dev/null \
              --classpath=/liquibase \
              --changeLogFile=db/changelog/db.changelog-master.yaml \
              --url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME} \
              --username=${DB_USERNAME} \
              --password=${DB_PASSWORD} \
              --driver=org.postgresql.Driver \
              update
        volumeMounts:
        - name: changelog
          mountPath: /liquibase/db/changelog
          readOnly: true
      restartPolicy: OnFailure
      volumes:
      - name: changelog
        configMap:
          name: liquibase-changelog
